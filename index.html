<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đại Lâm</title>
  <link rel="stylesheet" href="style2.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">

<body>

    <div class="app-chat" id="chat-window">

        <div class="header-chat" id="chat-header">
            <div class="logoBot">
                <img src="m5.jpg" alt="Logo">
            </div>
            Jayden Bot
        </div>

        <div class="messages">

            <div class="msg bot">Hi! My name is Jayden! How can I help you?</div>

        </div>

        <div class="in">
            <input id="chat-input" type="text" placeholder="Message Jayden Bot...">
            <button id="chat-send">➤</button>
        </div>

    </div>
</body>

<script src="script.js"></script>

</html>
